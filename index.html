<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>CodeMirror + Matter.js Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.css">
    <style>
      body { display: flex; margin: 0; }
      #editor { width: 50%; height: 100vh; }
      #canvasContainer { width: 50%; height: 100vh; }
      canvas { width: 100%; height: 100%; display: block; }
      .highlight-line {
        background-color: rgba(255, 255, 0, 0.3);
      }
      .CodeMirror {
        font-size: 24px;
        line-height: 2.0;
      }
      #sampleSelector {
        position: absolute;
        top: 10px;
        left: 800px;
        z-index: 1000;
        padding: 5px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <select id="sampleSelector">
      <option value="">サンプルを選択</option>
      <option value="domino">ドミノ倒し</option>
      <option value="circles">色付き円</option>
      <option value="stepCircle">色付き円（1行ずつ）</option>
    </select>
    <button id="resetBtn" style="position:absolute; top:45px; left:800px; z-index:1000;">🔁 実行</button>
    <button id="clearBtn" style="position:absolute; top:80px; left:800px; z-index:1000;">❌ 全削除</button>
    <div id="editor"></div>
    <div id="canvasContainer"><canvas id="world"></canvas></div>
  
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.14/mode/javascript/javascript.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
